<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Escape Chat - Enhanced Calls</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;1,9..144,500&display=swap" rel="stylesheet">
  <style>
    /* ============================================================
       ESCAPE CHAT — "Dusk Skyline" design system
       Ink-navy surfaces, warm paper light mode, one sunset gradient
       used sparingly as the signature accent (header, primary
       actions, sent bubbles). Manrope for UI, Fraunces for the
       wordmark only.
       ============================================================ */
    :root {
      --sunset-1: #FF6B4A;
      --sunset-2: #FF8F5C;
      --sunset-3: #6C5CE7;
      --gradient-dusk: linear-gradient(135deg, var(--sunset-1) 0%, var(--sunset-2) 45%, var(--sunset-3) 100%);
      --teal: #14B8A6;
      --danger: #EF4444;

      --paper: #EEF1F5;
      --surface: #FFFFFF;
      --surface-2: #F6F7FA;
      --ink: #171A21;
      --ink-soft: #5B6472;
      --line: #E4E7EC;

      --radius-lg: 26px;
      --radius-md: 18px;
      --radius-sm: 12px;
      --shadow-soft: 0 12px 30px rgba(23, 26, 33, 0.10);
      --shadow-lift: 0 20px 50px rgba(23, 26, 33, 0.16);

      /* Fallback; overwritten live by JS via visualViewport */
      --app-height: 100dvh;
    }

    body.dark-mode {
      --paper: #0C0E13;
      --surface: #171A21;
      --surface-2: #1E212B;
      --ink: #EDEFF3;
      --ink-soft: #9299A8;
      --line: rgba(255,255,255,0.08);
      --shadow-soft: 0 12px 30px rgba(0,0,0,0.35);
      --shadow-lift: 0 24px 60px rgba(0,0,0,0.5);
    }

    * { box-sizing: border-box; }

    .preload *,
    .preload *::before,
    .preload *::after {
      transition: none !important;
      animation: none !important;
      will-change: auto !important;
    }

    html { height: 100%; }

    body {
      margin: 0;
      height: var(--app-height);
      min-height: var(--app-height);
      max-height: var(--app-height);
      overflow: hidden;
      position: fixed;
      inset: 0;
      width: 100%;
      background:
        radial-gradient(120% 90% at 15% -10%, rgba(255,107,74,0.16) 0%, transparent 55%),
        radial-gradient(100% 80% at 100% 110%, rgba(108,92,231,0.14) 0%, transparent 55%),
        var(--paper);
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--ink);
      transition: background 0.35s ease, color 0.35s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    /* Main Container — a "boarding card" shell */
    .main-container {
      background: var(--surface);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lift);
      overflow: hidden;
      border: 1px solid var(--line);
      width: min(440px, 100%);
      height: min(var(--app-height), 860px);
      max-height: var(--app-height);
      display: flex;
      flex-direction: column;
      transition: background 0.35s ease, border-color 0.35s ease;
    }

    /* Login Box */
    #loginDiv {
      padding: 2.75rem 2.25rem;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      overflow-y: auto;
    }
    .brand-mark {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      background: var(--gradient-dusk);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.6rem;
      margin: 0 auto 1.25rem;
      box-shadow: 0 12px 26px rgba(255,107,74,0.35);
    }
    #loginDiv h3 {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 1.7rem;
      letter-spacing: -0.01em;
      margin-bottom: 0.4rem;
      color: var(--ink);
    }
    .login-tagline {
      color: var(--ink-soft);
      font-size: 0.92rem;
      margin-bottom: 2rem;
    }
    #loginDiv .form-control {
      background: var(--surface-2);
      border: 1px solid var(--line);
      border-radius: var(--radius-sm);
      padding: 14px 16px;
      font-size: 0.98rem;
      color: var(--ink);
    }
    #loginDiv .form-control::placeholder { color: var(--ink-soft); }
    #loginDiv .form-control:focus {
      background: var(--surface);
      border-color: var(--sunset-1);
      box-shadow: 0 0 0 4px rgba(255,107,74,0.12);
    }
    #loginDiv .btn-primary {
      background: var(--gradient-dusk);
      border: none;
      border-radius: var(--radius-sm);
      padding: 14px;
      font-weight: 700;
      letter-spacing: 0.01em;
      box-shadow: 0 10px 22px rgba(255,107,74,0.3);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    #loginDiv .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 14px 26px rgba(255,107,74,0.38); }
    #loginDiv .btn-primary:active { transform: translateY(0) scale(0.98); }
    #loginDiv .btn-outline-secondary {
      border: 1px solid var(--line);
      color: var(--ink);
      border-radius: var(--radius-sm);
      padding: 14px;
      font-weight: 600;
      background: transparent;
    }
    #loginDiv .btn-outline-secondary:hover { background: var(--surface-2); color: var(--ink); border-color: var(--line); }

    /* Chat Container */
    #chatDiv { display: flex; flex-direction: column; height: 100%; min-height: 0; }

    /* Chat Header */
    .chat-header {
      background: var(--gradient-dusk);
      color: #fff;
      padding: 14px 18px;
      padding-top: max(14px, env(safe-area-inset-top));
      display: flex;
      align-items: center;
      gap: 13px;
      flex: 0 0 auto;
      position: relative;
      z-index: 20;
    }
    .back-button {
      background: rgba(255,255,255,0.16);
      border: none;
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
      width: 38px;
      height: 38px;
      flex: 0 0 auto;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease, transform 0.15s ease;
    }
    .back-button:hover { background: rgba(255,255,255,0.28); }
    .back-button:active { transform: scale(0.92); }
    .user-avatar {
      width: 42px;
      height: 42px;
      background: rgba(255,255,255,0.22);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.05rem;
      font-weight: 700;
      flex: 0 0 auto;
    }
    .user-info { flex: 1; min-width: 0; }
    .user-name {
      font-weight: 700;
      font-size: 1.02rem;
      margin-bottom: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-status { font-size: 0.8rem; opacity: 0.85; }
    .header-call-buttons { display: flex; gap: 8px; flex: 0 0 auto; }
    .header-call-btn {
      background: rgba(255,255,255,0.16);
      border: none;
      color: #fff;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s ease, transform 0.15s ease;
      font-size: 1rem;
    }
    .header-call-btn:hover { background: rgba(255,255,255,0.28); transform: scale(1.06); }
    .header-call-btn:active { transform: scale(0.94); }

    /* User List */
    #userListContainer { height: 100%; min-height: 0; display: flex; flex-direction: column; }
    #userList {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      background: var(--surface);
      -webkit-overflow-scrolling: touch;
    }
    .user-item {
      padding: 14px 18px;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      transition: background 0.15s ease;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .user-item:hover { background: var(--surface-2); }
    .user-item:active { background: var(--surface-2); }
    .user-item-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 700;
      font-size: 1.05rem;
      flex: 0 0 auto;
      background: var(--gradient-dusk);
    }
    .user-item-info { flex: 1; min-width: 0; }
    .user-item-name {
      font-weight: 600;
      margin-bottom: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .user-item-status { font-size: 0.8rem; color: var(--ink-soft); }
    .user-item-status .fa-circle { font-size: 0.55rem; color: var(--teal) !important; }

    /* Chat Box */
    #chatArea { min-height: 0; }
    #chatBox {
      flex: 1;
      min-height: 0;
      background: var(--surface-2);
      padding: 16px 14px 6px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      -webkit-overflow-scrolling: touch;
    }

    /* Messages */
    .message {
      margin: 4px 0;
      padding: 10px 14px;
      border-radius: 18px;
      max-width: 78%;
      word-wrap: break-word;
      overflow-wrap: break-word;
      position: relative;
      animation: messageAppear 0.25s ease-out;
      font-size: 0.95rem;
      line-height: 1.4;
      touch-action: pan-y;
      -webkit-user-select: none;
      user-select: none;
      box-shadow: 0 1px 2px rgba(23,26,33,0.04);
    }
    @keyframes messageAppear {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .sent {
      background: var(--gradient-dusk);
      color: white;
      margin-left: auto;
      border-bottom-right-radius: 4px;
    }
    .received {
      background: var(--surface);
      color: var(--ink);
      border: 1px solid var(--line);
      margin-right: auto;
      border-bottom-left-radius: 4px;
      cursor: pointer;
    }
    .received:active { transform: scale(0.99); }
    .message.reply-target {
      box-shadow: 0 0 0 2px var(--sunset-1), var(--shadow-soft);
    }
    .message-time {
      font-size: 0.68rem;
      opacity: 0.65;
      margin-top: 4px;
      text-align: right;
    }
    .read-status { font-size: 0.7rem; opacity: 0.6; margin-top: 2px; }

    /* Date Divider */
    .date-divider {
      text-align: center;
      margin: 16px 0;
      color: var(--ink-soft);
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      position: relative;
    }
    .date-divider::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: var(--line);
    }
    .date-divider span {
      background: var(--surface-2);
      padding: 0 14px;
      position: relative;
      z-index: 2;
    }

    /* Input Area */
    .input-area {
      padding: 10px 12px;
      padding-bottom: max(10px, env(safe-area-inset-bottom));
      background: var(--surface);
      border-top: 1px solid var(--line);
      flex: 0 0 auto;
    }
    .input-group {
      border-radius: 26px;
      overflow: hidden;
      background: var(--surface-2);
      display: flex;
      gap: 6px;
      align-items: center;
      padding: 4px;
      border: 1px solid var(--line);
    }
    .form-control {
      border: none;
      background: transparent;
      padding: 11px 14px;
      font-size: 0.96rem;
      flex: 1;
      color: var(--ink);
      min-width: 0;
    }
    .form-control:focus { box-shadow: none; outline: none; background: transparent; color: var(--ink); }
    .btn-send {
      background: var(--gradient-dusk);
      border: none;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      color: white;
      font-weight: 600;
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0;
      transition: transform 0.15s ease;
    }
    .btn-send::before {
      content: "\f1d8";
      font-family: "Font Awesome 6 Free";
      font-weight: 900;
      font-size: 1rem;
    }
    .btn-send:active { transform: scale(0.9); }

    /* Reply preview above input */
    #replyPreview {
      display: none;
      padding: 8px 12px;
      border-left: 3px solid var(--sunset-1);
      background: var(--surface-2);
      color: var(--ink);
      border-radius: var(--radius-sm);
      margin: 0 2px 8px;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 0.85rem;
    }
    #replyPreview .reply-excerpt { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--ink-soft); }
    #replyPreview .reply-cancel { background: transparent; border: none; font-size: 1rem; cursor: pointer; color: var(--ink-soft); width: 24px; height: 24px; }

    /* Quoted reply inside a message */
    .reply-quote {
      border-left: 3px solid rgba(255,255,255,0.55);
      padding: 5px 9px;
      margin-bottom: 6px;
      font-size: 0.8rem;
      color: inherit;
      opacity: 0.85;
      background: rgba(255,255,255,0.12);
      border-radius: 6px;
    }
    .received .reply-quote {
      border-left-color: var(--sunset-1);
      background: rgba(255,107,74,0.06);
    }

    /* Reply button inside message (shown on hover, desktop) */
    .message .reply-btn {
      position: absolute;
      top: 4px;
      right: -34px;
      width: 28px;
      height: 28px;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      border: none;
      background: var(--surface);
      box-shadow: var(--shadow-soft);
      color: var(--ink-soft);
      cursor: pointer;
      font-size: 12px;
      z-index: 5;
    }
    .received:hover .reply-btn { display: flex; }

    /* Typing Indicator */
    #typingIndicator {
      font-style: normal;
      color: var(--ink-soft);
      padding: 8px 14px;
      font-size: 0.82rem;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 14px;
      margin: 6px 14px;
      align-self: flex-start;
      max-width: fit-content;
    }
    #typingIndicator .fa-ellipsis-h { color: var(--sunset-1); }

    /* ===== CALL STYLES ===== */
    #callContainer {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: linear-gradient(160deg, #14161d 0%, #0a0b0f 100%);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 10000;
      flex-direction: column;
      font-family: 'Manrope', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #callContainer.active { display: flex; }

    #videoContainer { width: 100%; height: 100%; position: relative; overflow: hidden; }

    #remoteVideo { width: 100%; height: 100%; object-fit: cover; background: #000; transition: all 0.3s ease; }

    #localVideo {
      position: absolute;
      top: max(20px, env(safe-area-inset-top));
      right: 20px;
      width: 116px;
      height: 156px;
      border-radius: 16px;
      border: 2px solid rgba(255,255,255,0.25);
      object-fit: cover;
      background: #000;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      z-index: 2;
    }
    #localVideo:hover { transform: scale(1.04); }
    #localVideo.minimized { width: 76px; height: 108px; top: 10px; right: 10px; }

    #callInfoBar {
      position: absolute;
      top: 0; left: 0; right: 0;
      background: linear-gradient(180deg, rgba(0,0,0,0.65) 0%, transparent 100%);
      color: white;
      padding: 60px 20px 20px;
      padding-top: max(60px, calc(env(safe-area-inset-top) + 30px));
      text-align: center;
      z-index: 3;
    }
    #callStatus { font-size: 1.25rem; font-weight: 600; margin-bottom: 6px; opacity: 0.95; }
    #callerInfo { font-size: 1.02rem; opacity: 0.75; margin-bottom: 4px; }
    #callDuration { font-size: 0.95rem; opacity: 0.65; font-variant-numeric: tabular-nums; }

    #callControls {
      position: absolute;
      bottom: max(30px, env(safe-area-inset-bottom));
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 22px;
      padding: 0 20px;
      z-index: 3;
      flex-wrap: wrap;
    }
    .control-btn {
      width: 64px; height: 64px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.2s ease;
      box-shadow: 0 8px 22px rgba(0,0,0,0.35);
    }
    .control-btn:active { transform: scale(0.92); }
    .control-btn-lg { width: 72px; height: 72px; font-size: 1.6rem; }
    .accept-call { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
    .decline-call, .end-call { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
    .mute-audio, .mute-video, .speaker-btn, .screen-control-btn {
      background: rgba(255,255,255,0.14);
      backdrop-filter: blur(10px);
      color: white;
    }
    .mute-audio.active, .mute-video.active { background: rgba(255,255,255,0.28); }
    .speaker-btn.active { background: var(--gradient-dusk); }
    .screen-control-btn.active { background: rgba(255,255,255,0.35); }

    #connectionStatus {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.75);
      color: white;
      padding: 20px 30px;
      border-radius: 20px;
      text-align: center;
      z-index: 4;
      display: none;
    }
    #connectionStatus.visible { display: block; }
    .connection-dots { display: flex; justify-content: center; gap: 4px; margin-top: 10px; }
    .connection-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--sunset-1); animation: pulse 1.5s infinite; }
    .connection-dot:nth-child(2) { animation-delay: 0.2s; }
    .connection-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50% { opacity: 1; transform: scale(1.2); }
    }

    .audio-call #remoteVideo, .audio-call #localVideo { display: none; }
    .audio-call #videoContainer {
      background: linear-gradient(160deg, #1a1c25 0%, #0a0b0f 100%);
      display: flex; justify-content: center; align-items: center;
    }
    .audio-avatar {
      width: 140px; height: 140px;
      border-radius: 50%;
      background: var(--gradient-dusk);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.8rem; color: white;
      margin-bottom: 30px;
      box-shadow: 0 20px 50px rgba(255,107,74,0.35);
    }

    .background-audio-indicator {
      position: absolute; top: 20px; left: 20px;
      background: rgba(0,0,0,0.7); color: white;
      padding: 8px 15px; border-radius: 20px;
      font-size: 0.85rem; z-index: 3; display: none;
    }
    .background-audio-indicator.visible { display: flex; align-items: center; gap: 8px; }

    .screen-off #videoContainer { filter: brightness(0); }
    .screen-off #callInfoBar { opacity: 0.3; }

    @keyframes buttonPulse {
      0% { transform: scale(1); } 50% { transform: scale(1.08); } 100% { transform: scale(1); }
    }
    .pulse { animation: buttonPulse 2s infinite; }

    .call-accepted-banner {
      position: fixed;
      top: max(20px, env(safe-area-inset-top));
      left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
      padding: 13px 26px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      box-shadow: 0 10px 30px rgba(34,197,94,0.35);
      z-index: 10001;
      animation: bannerSlide 0.4s ease-out;
    }
    @keyframes bannerSlide { from { opacity: 0; transform: translate(-50%, -20px); } to { opacity: 1; transform: translate(-50%, 0); } }

    #toggleTheme {
      background: transparent;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      transition: transform 0.3s ease;
    }
    #toggleTheme:hover { transform: rotate(25deg); }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: var(--line); border-radius: 10px; }

    /* Mobile: full-bleed app shell, no floating card */
    @media (max-width: 640px) {
      .main-container {
        width: 100%;
        height: var(--app-height);
        max-height: var(--app-height);
        border-radius: 0;
        border: none;
        box-shadow: none;
      }
      .message { max-width: 85%; }
    }

    @media (max-width: 480px) {
      #localVideo { width: 84px; height: 118px; }
      .control-btn { width: 56px; height: 56px; font-size: 1.25rem; }
      .control-btn-lg { width: 66px; height: 66px; }
      #callControls { gap: 14px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    }
  </style>
</head>
<body class="preload">

  <!-- Main container always visible -->
  <div class="main-container">
    <div id="loginDiv">
      <div class="brand-mark"><i class="fas fa-paper-plane"></i></div>
      <h3>Escape Chat</h3>
      <p class="login-tagline">Real conversations, unplugged from the noise.</p>

    // Utility functions
    function formatDate(timestamp) {
      const date = new Date(timestamp);
      const today = new Date();
      const yesterday = new Date(today);
      yesterday.setDate(yesterday.getDate() - 1);
      
      if (date.toDateString() === today.toDateString()) {
        return "Today";
      } else if (date.toDateString() === yesterday.toDateString()) {
        return "Yesterday";
      } else {
        return date.toLocaleDateString();
      }
    }

    function formatDateTime(timestamp) {
      const date = new Date(timestamp);
      return `${formatDate(timestamp)} ${date.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;

      'linear-gradient(135deg, #FF6B4A, #FF8F5C)',
      'linear-gradient(135deg, #6C5CE7, #8B7CF6)',
      'linear-gradient(135deg, #14B8A6, #2DD4BF)',

    }

    // ===== ENHANCED CALL FUNCTIONS =====

    async function createPeerConnection() {
      try {
        console.log('Creating peer connection...');
        
        peerConnection = new RTCPeerConnection(configuration);
        
        peerConnection.onconnectionstatechange = () => {
          const state = peerConnection.connectionState;
          console.log('Connection state:', state);
          
          updateConnectionStatus(state);
          
          switch(state) {
            case 'connected':
              onCallConnected();
              break;
            case 'disconnected':
              attemptReconnection();
              break;
            case 'failed':
              onCallFailed();
              break;
            case 'closed':
              onCallClosed();
              break;
          }
        };
        
        peerConnection.oniceconnectionstatechange = () => {
          console.log('ICE connection state:', peerConnection.iceConnectionState);
        };
        
        peerConnection.onicecandidate = (event) => {
          if (event.candidate) {
            console.log('New ICE candidate:', event.candidate);
            db.ref(`calls/${currentCallId}/candidates/${currentUserId}`).push(event.candidate.toJSON())
              .catch(error => console.warn('Failed to send ICE candidate:', error));
          }
        };
        
        peerConnection.ontrack = (event) => {
          console.log('Received remote stream');
          remoteStream = event.streams[0];
          document.getElementById("remoteVideo").srcObject = remoteStream;
        };
        
        if (localStream) {
          localStream.getTracks().forEach(track => {
            peerConnection.addTrack(track, localStream);
          });
        }
        
        return peerConnection;
      } catch (error) {
        console.error('Error creating peer connection:', error);
        throw error;
      }
    }

    function updateConnectionStatus(state) {
      const statusElement = document.getElementById('callStatus');
      const connectionElement = document.getElementById('connectionStatus');
      
      switch(state) {
        case 'connecting':
          statusElement.textContent = 'Connecting...';
          connectionElement.style.display = 'block';
          break;
        case 'connected':
          statusElement.textContent = 'Connected';
          connectionElement.style.display = 'none';
          break;
        case 'disconnected':
          statusElement.textContent = 'Reconnecting...';
          connectionElement.style.display = 'block';
          break;
        case 'failed':
          statusElement.textContent = 'Connection Failed';
          connectionElement.style.display = 'block';
          break;
        default:
          statusElement.textContent = state;
      }
    }

    function attemptReconnection() {
      if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
        reconnectAttempts++;
        console.log(`Reconnection attempt ${reconnectAttempts}`);
        
        setTimeout(() => {
          if (peerConnection && peerConnection.connectionState === 'disconnected') {
            restartIce();
          }
        }, 2000 * reconnectAttempts);
      } else {
        onCallFailed();
      }
    }

    async function restartIce() {
      try {
        if (isCaller) {
          const offer = await peerConnection.createOffer();
          await peerConnection.setLocalDescription(offer);
          await db.ref(`calls/${currentCallId}/offer`).set(offer);
        }
      } catch (error) {
        console.error('Error restarting ICE:', error);
      }
    }

    async function setupMediaStream(audioOnly = false) {
      try {
        const constraints = {
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          },
          video: audioOnly ? false : {
            width: { ideal: 1280 },
            height: { ideal: 720 },
            frameRate: { ideal: 30 }
          }
        };
        
        localStream = await navigator.mediaDevices.getUserMedia(constraints);
        document.getElementById("localVideo").srcObject = localStream;
        
        return localStream;
      } catch (error) {
        console.error('Error accessing media devices:', error);
        throw new Error('Cannot access camera/microphone. Please check permissions.');
      }
    }

    // ===== FIXED AUDIO ROUTING: USER CHOOSES SPEAKER OR EARPIECE =====
    async function toggleSpeaker() {
      try {
        // Check if the browser supports setSinkId
        if (!('setSinkId' in HTMLMediaElement.prototype)) {
          console.warn('Speaker toggle not supported in this browser');
          alert('Speaker control is not supported in this browser. Please use device controls.');
          return;
        }

        const remoteVideo = document.getElementById('remoteVideo');
        
        if (isSpeakerOn) {
          // Switch to earpiece (default device)
          try {
            await remoteVideo.setSinkId('');
            document.getElementById('speakerBtn').classList.remove('active');
            document.getElementById('speakerBtn').innerHTML = '<i class="fas fa-volume-up"></i>';
            isSpeakerOn = false;
            console.log('Switched to earpiece');
          } catch (error) {
            console.error('Error switching to earpiece:', error);
            // Fallback: try 'default'
            try {
              await remoteVideo.setSinkId('default');
              document.getElementById('speakerBtn').classList.remove('active');
              document.getElementById('speakerBtn').innerHTML = '<i class="fas fa-volume-up"></i>';
              isSpeakerOn = false;
            } catch (fallbackError) {
              console.error('Fallback to default failed:', fallbackError);
            }
          }
        } else {
          // Switch to speaker (first available audio output device)
          try {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const speakers = devices.filter(device => device.kind === 'audiooutput');
            
            if (speakers.length > 0 && speakers[0].deviceId) {
              await remoteVideo.setSinkId(speakers[0].deviceId);
              document.getElementById('speakerBtn').classList.add('active');
              document.getElementById('speakerBtn').innerHTML = '<i class="fas fa-volume-down"></i>';
              isSpeakerOn = true;
              console.log('Switched to speaker');
            } else {
              console.warn('No speaker devices found');
              alert('No speaker device found. Using default audio output.');
            }
          } catch (error) {
            console.error('Error switching to speaker:', error);
            // Fallback: try 'default' as speaker
            try {
              await remoteVideo.setSinkId('default');
              document.getElementById('speakerBtn').classList.add('active');
              document.getElementById('speakerBtn').innerHTML = '<i class="fas fa-volume-down"></i>';
              isSpeakerOn = true;
            } catch (fallbackError) {
              console.error('Fallback to default as speaker failed:', fallbackError);
            }
          }
        }
      } catch (error) {
        console.error('Speaker toggle error:', error);
        alert('Error switching audio output. Please check browser permissions.');
      }
    }

    function toggleScreen() {
      isScreenOn = !isScreenOn;
      const screenBtn = document.getElementById('screenControlBtn');

      if (isScreenOn) {

    async function initiateCall(otherUserId, audioOnly = false) {
      if (callInProgress) {
        alert("You already have an active call. Please end it first.");
        return;
      }
      
      try {
        isCaller = true;
        isAudioCall = audioOnly;
        
        currentCallId = `${currentUserId}_${otherUserId}_${Date.now()}`;
        
        const existingCall = await db.ref(`calls/${currentCallId}`).once('value');
        if (existingCall.exists()) {
          alert("Call already in progress. Please try again.");
          return;
        }
        
        callInProgress = true;
        reconnectAttempts = 0;
        
        showCallInterface('outgoing', audioOnly);
        document.getElementById("callerInfo").textContent = "Calling...";
        
        await setupMediaStream(audioOnly);
        await createPeerConnection();
        
        // Initialize speaker state: default to earpiece (false)
        isSpeakerOn = false;
        document.getElementById('speakerBtn').classList.remove('active');
        document.getElementById('speakerBtn').innerHTML = '<i class="fas fa-volume-up"></i>';
        
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        
        await db.ref(`calls/${currentCallId}`).set({
          callerId: currentUserId,
          receiverId: otherUserId,
          status: "calling",
          isAudioCall: audioOnly,
          offer: offer,
          timestamp: Date.now()
        });
        
        connectionTimeout = setTimeout(() => {
          if (peerConnection.connectionState !== 'connected') {
            onCallFailed();
          }
        }, 30000);
        
        db.ref(`calls/${currentCallId}/answer`).on('value', handleAnswer);
        db.ref(`calls/${currentCallId}/candidates/${otherUserId}`).on('child_added', handleRemoteCandidate);
        db.ref(`calls/${currentCallId}/status`).on('value', handleCallStatusChange);
        
      } catch (error) {
        console.error('Error initiating call:', error);
        alert('Failed to start call: ' + error.message);
        endCall();
      }
    }

    async function handleAnswer(snapshot) {
      const answer = snapshot.val();
      if (answer && peerConnection) {
        await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
        clearTimeout(connectionTimeout);
      }
    }

    async function handleRemoteCandidate(snapshot) {
      const candidateData = snapshot.val();
      if (candidateData && peerConnection.remoteDescription) {
        try {
          const candidate = new RTCIceCandidate(candidateData);
          await peerConnection.addIceCandidate(candidate);
        } catch (error) {
          console.warn('Error adding ICE candidate:', error);
        }
      }
    }

    function handleCallStatusChange(snapshot) {
      const status = snapshot.val();
      if (status === "ended" && callInProgress) {
        document.getElementById("callStatus").textContent = "Call Ended";
        setTimeout(endCall, 2000);
      }
    }

    function handleIncomingCall(callId, callData) {
      const callParts = callId.split('_');
      if (callParts.length < 3 || callParts[0] !== callData.callerId) {
        console.warn('Invalid call ID format, ignoring call:', callId);
        db.ref(`calls/${callId}/status`).set("invalid_format");
        return;
      }
      
      if (callInProgress) {
        db.ref(`calls/${callId}/status`).set("declined");
        return;
      }
      
      currentCallId = callId;
      callInProgress = true;
      isCaller = false;
      isAudioCall = callData.isAudioCall || false;
      
      showCallInterface('incoming', isAudioCall);
      
      db.ref(`users/${callData.callerId}`).once('value', (snapshot) => {
        const userData = snapshot.val();
        if (userData) {
          document.getElementById("callerInfo").textContent = userData.email;
        }
      });
      
      pendingOffer = callData.offer;
      db.ref(`calls/${currentCallId}/status`).on('value', handleCallStatusChange);
    }

    function showCallInterface(type, audioOnly) {
      const container = document.getElementById('callContainer');
      const acceptBtn = document.getElementById('acceptCall');
      const declineBtn = document.getElementById('declineCall');
      const endBtn = document.getElementById('endCall');
      const muteAudioBtn = document.getElementById('muteAudio');
      const muteVideoBtn = document.getElementById('muteVideo');
      const speakerBtn = document.getElementById('speakerBtn');
      const screenBtn = document.getElementById('screenControlBtn');
      
      container.classList.add('active');
      
      if (audioOnly) {
        container.classList.add('audio-call');
        document.querySelector('.audio-avatar').style.display = 'flex';
        muteVideoBtn.style.display = 'none';
        screenBtn.style.display = 'flex';
      } else {
        container.classList.remove('audio-call');
        document.querySelector('.audio-avatar').style.display = 'none';
        muteVideoBtn.style.display = 'flex';
        screenBtn.style.display = 'flex';
      }
      
      switch(type) {
        case 'incoming':
          acceptBtn.style.display = 'flex';
          declineBtn.style.display = 'flex';
          endBtn.style.display = 'none';
          muteAudioBtn.style.display = 'none';
          muteVideoBtn.style.display = 'none';
          speakerBtn.style.display = 'none';
          screenBtn.style.display = 'none';
          document.getElementById('callStatus').textContent = 'Incoming Call';
          break;
          
        case 'outgoing':
          acceptBtn.style.display = 'none';
          declineBtn.style.display = 'none';
          endBtn.style.display = 'flex';
          muteAudioBtn.style.display = 'flex';
          muteVideoBtn.style.display = !audioOnly ? 'flex' : 'none';
          speakerBtn.style.display = 'flex';
          screenBtn.style.display = 'flex';
          document.getElementById('callStatus').textContent = 'Calling...';
          break;
          
        case 'active':
          acceptBtn.style.display = 'none';
          declineBtn.style.display = 'none';
          endBtn.style.display = 'flex';
          muteAudioBtn.style.display = 'flex';
          muteVideoBtn.style.display = !audioOnly ? 'flex' : 'none';
          speakerBtn.style.display = 'flex';
          screenBtn.style.display = 'flex';
          startCallTimer();
          break;
      }
    }

    function startCallTimer() {
      document.getElementById('callDuration').textContent = '00:00';
      callStartTime = Date.now();
      
      if (callDurationInterval) {
        clearInterval(callDurationInterval);
      }
      
      callDurationInterval = setInterval(() => {
        const duration = Math.floor((Date.now() - callStartTime) / 1000);
        const minutes = Math.floor(duration / 60);
        const seconds = duration % 60;
        document.getElementById('callDuration').textContent = 
          `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
      }, 1000);
    }

    function onCallConnected() {
      showCallInterface('active', isAudioCall);
      showCallAcceptedBanner();
      reconnectAttempts = 0;
    }

    function onCallFailed() {
      alert('Call failed to connect. Please try again.');
      endCall();
    }

    function onCallClosed() {
      // Cleanup handled in endCall
    }

    function endCall() {
      console.log('Ending call with comprehensive cleanup');
      
      if (callDurationInterval) {
        clearInterval(callDurationInterval);
        callDurationInterval = null;
      }
      
      if (connectionTimeout) {
        clearTimeout(connectionTimeout);
        connectionTimeout = null;
      }
      
      if (currentCallId) {
        db.ref(`calls/${currentCallId}`).off();
        db.ref(`calls/${currentCallId}/offer`).off();
        db.ref(`calls/${currentCallId}/answer`).off();
        db.ref(`calls/${currentCallId}/status`).off();
        db.ref(`calls/${currentCallId}/candidates`).off();
        
        db.ref(`calls/${currentCallId}/status`).set('ended');
        
        setTimeout(() => {
          db.ref(`calls/${currentCallId}`).remove();
        }, 5000);
        
        currentCallId = null;
      }
      
      if (localStream) {
        localStream.getTracks().forEach(track => track.stop());
        localStream = null;
      }
      
      if (remoteStream) {
        remoteStream.getTracks().forEach(track => track.stop());
        remoteStream = null;
      }
      
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }
      
      callInProgress = false;
      isCaller = false;
      isAudioCall = false;
      reconnectAttempts = 0;
      pendingOffer = null;
      isAudioMuted = false;
      isVideoMuted = false;
      isSpeakerOn = false;
      isScreenOn = true;
      callStartTime = null;
      
      document.getElementById('callContainer').classList.remove('active');
      document.getElementById('callContainer').classList.remove('screen-off');
      document.querySelector('.background-audio-indicator').classList.remove('visible');
      
      document.getElementById('muteAudio').innerHTML = '<i class="fas fa-microphone"></i>';
      document.getElementById('muteVideo').innerHTML = '<i class="fas fa-video"></i>';
      document.getElementById('speakerBtn').classList.remove('active');
      document.getElementById('speakerBtn').innerHTML = '<i class="fas fa-volume-up"></i>';
      document.getElementById('screenControlBtn').classList.remove('active');
      
      document.getElementById('callDuration').textContent = '00:00';
      document.getElementById('callStatus').textContent = 'Connecting...';
      document.getElementById('callerInfo').textContent = 'User';
      
      console.log('Call cleanup completed');
    }

    function toggleAudio() {
      if (localStream) {
        const audioTracks = localStream.getAudioTracks();
        audioTracks.forEach(track => {
          track.enabled = !track.enabled;
        });
        isAudioMuted = !isAudioMuted;
        document.getElementById("muteAudio").innerHTML = isAudioMuted ? 
          '<i class="fas fa-microphone-slash"></i>' : '<i class="fas fa-microphone"></i>';
        document.getElementById("muteAudio").classList.toggle('active', isAudioMuted);
      }
    }

    function toggleVideo() {
      if (localStream && !isAudioCall) {
        const videoTracks = localStream.getVideoTracks();
        videoTracks.forEach(track => {
          track.enabled = !track.enabled;
        });
        isVideoMuted = !isVideoMuted;
        document.getElementById("muteVideo").innerHTML = isVideoMuted ? 
          '<i class="fas fa-video-slash"></i>' : '<i class="fas fa-video"></i>';
        document.getElementById("muteVideo").classList.toggle('active', isVideoMuted);
        document.getElementById('localVideo').style.display = isVideoMuted ? 'none' : 'block';
      }
    }

    document.getElementById("acceptCall").addEventListener("click", acceptIncomingCall);
    document.getElementById("declineCall").addEventListener("click", declineIncomingCall);
    document.getElementById("endCall").addEventListener("click", endCall);
    document.getElementById("muteAudio").addEventListener("click", toggleAudio);
    document.getElementById("muteVideo").addEventListener("click", toggleVideo);
    document.getElementById("speakerBtn").addEventListener("click", toggleSpeaker);
    document.getElementById("screenControlBtn").addEventListener("click", toggleScreen);

    document.getElementById("localVideo").addEventListener("click", function() {
      this.classList.toggle('minimized');
    });

    async function acceptIncomingCall() {
      try {
        if (!pendingOffer) {
          throw new Error('No offer received');
        }
        
        db.ref(`calls/${currentCallId}/status`).set("accepted");
        showCallInterface('active', isAudioCall);
        
        await setupMediaStream(isAudioCall);
        await createPeerConnection();
        
        // Initialize speaker state: default to earpiece (false)
        isSpeakerOn = false;
        document.getElementById('speakerBtn').classList.remove('active');
        document.getElementById('speakerBtn').innerHTML = '<i class="fas fa-volume-up"></i>';
        
        await peerConnection.setRemoteDescription(new RTCSessionDescription(pendingOffer));
        
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        
        await db.ref(`calls/${currentCallId}/answer`).set({
          ...answer,
          from: currentUserId
        });
        
        const callerId = currentCallId.split('_')[0];
        db.ref(`calls/${currentCallId}/candidates/${callerId}`).on('child_added', handleRemoteCandidate);
        
      } catch (error) {
        console.error('Error accepting call:', error);
        alert('Error accepting call: ' + error.message);
        endCall();
      }
    }

    function declineIncomingCall() {
      db.ref(`calls/${currentCallId}/status`).set("declined");
      document.getElementById("callStatus").textContent = "Call Declined";
      setTimeout(endCall, 2000);
    }

    function listenForCalls() {
      db.ref("calls").on("child_added", (snapshot) => {
        const callId = snapshot.key;
        const callData = snapshot.val();
        
        if (callData.receiverId === currentUserId && 
            callData.callerId !== currentUserId && 
            callData.status === "calling" &&
            !callInProgress) {
          handleIncomingCall(callId, callData);
        }
      });
    }

    function clearOldCalls() {
      db.ref("calls").once('value').then((snapshot) => {
        const calls = snapshot.val();
        if (calls) {
          Object.keys(calls).forEach(callId => {
            if (calls[callId].status === "ended") {
              db.ref(`calls/${callId}`).remove();
            }
          });
        }
      });
    }

    // Auth functions
    function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      auth.signInWithEmailAndPassword(email, password).catch((error) => alert(error.message));
    }

    function register() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      auth.createUserWithEmailAndPassword(email, password)
        .then((user) => {
          db.ref("users/" + user.user.uid).set({ email: email, online: true });
        })
        .catch((error) => {
          if (error.code === "auth/email-already-in-use") {
            alert("This email is already registered. Please login.");
          } else {
            alert(error.message);
          }
        });
    }

    // Load users list
    function loadUsers() {
      const userList = document.getElementById("userList");
      userList.innerHTML = "<div class='user-item text-muted'>Loading users...</div>";

      db.ref("users").on("value", (snapshot) => {
        userList.innerHTML = "";
        const users = snapshot.val() || {};

        Object.entries(users).forEach(([uid, userData]) => {
          if (uid === currentUserId) return;

          const div = document.createElement("div");
          div.className = "user-item";
          div.onclick = () => {
            const status = userData.online ? 
              '<i class="fas fa-circle text-success me-1"></i>Online' : 
              `Last seen ${userData.lastOnline ? formatDateTime(userData.lastOnline) : 'a long time ago'}`;
            showChatArea(uid, userData.email, status);
          };

          const avatar = document.createElement("div");
          avatar.className = "user-item-avatar";
          avatar.textContent = getInitials(userData.email);
          avatar.style.background = avatarColor(userData.email);

          const info = document.createElement("div");
          info.className = "user-item-info";
          
          const name = document.createElement("div");
          name.className = "user-item-name";
          name.textContent = userData.email;

          const status = document.createElement("div");
          status.className = "user-item-status";
          if (userData.online) {
            status.innerHTML = '<i class="fas fa-circle text-success me-1"></i>Online';
          } else if (userData.lastOnline) {
            status.textContent = `Last seen ${formatDateTime(userData.lastOnline)}`;
          } else {
            status.textContent = "Offline";
          }

          info.appendChild(name);
          info.appendChild(status);
          div.appendChild(avatar);
          div.appendChild(info);
          userList.appendChild(div);
        });

        if (userList.innerHTML === "") {
          userList.innerHTML = "<div class='user-item text-muted'>No other users found.</div>";
        }
      });
    }

    // Chat functions
    function startChatWith(otherUserId) {
      chatId = currentUserId < otherUserId
        ? `${currentUserId}_${otherUserId}`
        : `${otherUserId}_${currentUserId}`;

      document.getElementById("chatBox").innerHTML = "";

      db.ref(`users/${otherUserId}`).on("value", (snapshot) => {
        const data = snapshot.val();
        let statusText = "Offline";
        if (data.online) {
          statusText = '<i class="fas fa-circle text-success me-1"></i>Online';
        } else if (data.lastOnline) {
          statusText = `Last seen ${formatDateTime(data.lastOnline)}`;
        }
        document.getElementById("headerUserStatus").innerHTML = statusText;
      });

      db.ref(`chats/${chatId}/typing`).on("value", (snapshot) => {
        const typingData = snapshot.val() || {};
        const otherTyping = Object.entries(typingData).some(([uid, isTyping]) => uid !== currentUserId && isTyping);
        document.getElementById("typingIndicator").style.display = otherTyping ? "block" : "none";
      });

      db.ref(`chats/${chatId}/messages`).off();
      db.ref(`chats/${chatId}/messages`).on("child_added", (snapshot) => {
        const msg = snapshot.val();
        const msgId = snapshot.key;

        const msgDate = formatDate(msg.timestamp);
        const chatBox = document.getElementById("chatBox");
        const lastDateDivider = chatBox.querySelector('.date-divider:last-child');
        const lastDate = lastDateDivider ? lastDateDivider.textContent : null;

        if (msgDate !== lastDate) {
          const dateDivider = document.createElement("div");
          dateDivider.className = "date-divider";
          dateDivider.innerHTML = `<span>${msgDate}</span>`;
          chatBox.appendChild(dateDivider);
        }

        const div = document.createElement("div");
        div.className = msg.senderId === currentUserId ? "message sent" : "message received";

        if (msg.replyTo && msg.replyTo.text) {
          const quote = document.createElement('div');
          quote.className = 'reply-quote';
          const who = msg.replyTo.senderEmail ? msg.replyTo.senderEmail.split('@')[0] : 'User';
          quote.textContent = `${who}: ${msg.replyTo.text}`;
          div.appendChild(quote);
        }

        const textDiv = document.createElement("div");
        textDiv.textContent = msg.text;

        const timeDiv = document.createElement("div");
        timeDiv.className = "message-time";
        timeDiv.textContent = new Date(msg.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        div.appendChild(textDiv);
        div.appendChild(timeDiv);

        // Tap-to-reply: only on messages received from the other person
        if (msg.senderId !== currentUserId) {
          div.addEventListener('click', () => {
            document.querySelectorAll('.message.reply-target').forEach(el => el.classList.remove('reply-target'));
            div.classList.add('reply-target');
            setReply(msgId, msg.senderId, msg.text, msg.senderEmail || 'User');
            setTimeout(() => div.classList.remove('reply-target'), 1400);
          });
        }

        chatBox.appendChild(div);

        chatBox.scrollTop = chatBox.scrollHeight;

        db.ref(`chats/${chatId}/messages/${msgId}/readBy/${currentUserId}`).set(true);
      });
    }

    function sendMessage() {
      if (!selectedUserId) {
        alert("Please select a user to chat with.");
        return;
      }
      const text = document.getElementById("messageInput").value.trim();
      if (!text) return;

      const payload = {
        text: text,
        senderId: currentUserId,
        senderEmail: auth.currentUser ? auth.currentUser.email : null,
        timestamp: Date.now(),
        readBy: { [currentUserId]: true }
      };

      if (replyTo) {
        payload.replyTo = {
          messageId: replyTo.messageId,
          senderId: replyTo.senderId,
          senderEmail: replyTo.senderEmail,
          text: replyTo.text
        };
      }

      const newMsgRef = db.ref(`chats/${chatId}/messages`).push();
      newMsgRef.set(payload);

      document.getElementById("messageInput").value = "";
      cancelReply();
    }

    document.getElementById("messageInput").addEventListener("input", () => {
      if (chatId) {
        db.ref(`chats/${chatId}/typing/${currentUserId}`).set(document.getElementById("messageInput").value.trim().length > 0);
      }
    });

    document.getElementById("messageInput").addEventListener("blur", () => {
      if (chatId) {
        db.ref(`chats/${chatId}/typing/${currentUserId}`).set(false);
      }
    });

    document.getElementById("toggleTheme").addEventListener("click", () => {
      document.body.classList.toggle("dark-mode");
      document.getElementById("toggleTheme").textContent =
        document.body.classList.contains("dark-mode") ? "☀️" : "🌙";
    });

    auth.onAuthStateChanged((user) => {
      if (user) {
        currentUserId = user.uid;
        db.ref(`users/${currentUserId}`).update({ online: true });
        db.ref(`users/${currentUserId}`).onDisconnect().update({
          online: false,
          lastOnline: firebase.database.ServerValue.TIMESTAMP
        });
        loadUsers();
        listenForCalls();
        clearOldCalls();
        cleanupMalformedCalls();
        document.getElementById("loginDiv").style.display = "none";
        document.getElementById("chatDiv").style.display = "flex";
      } else {
        document.getElementById("loginDiv").style.display = "block";
        document.getElementById("chatDiv").style.display = "none";
      }
    });

    document.getElementById("messageInput").addEventListener("keypress", (e) => {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>

  <!-- ============================================================
       Mobile keyboard / viewport handling.
       Problem this fixes: on phones, when the keyboard opens the
       browser used to resize the whole page (or the OS scrolled it),
       pushing the header off-screen and leaving the input hidden
       behind the keyboard. Instead, we track the *visual* viewport
       (the part of the screen actually visible above the keyboard)
       and size the app shell to exactly that, so only the message
       list shrinks — header stays put, input stays just above the
       keyboard, and the page itself never scrolls.
       ============================================================ -->
  <script>
    (function () {
      const root = document.documentElement;

      function setAppHeight() {
        const vv = window.visualViewport;
        const height = vv ? vv.height : window.innerHeight;
        root.style.setProperty('--app-height', height + 'px');

        // Keep the chat scrolled to the latest message as the
        // keyboard opens/closes and the box resizes.
        const chatBox = document.getElementById('chatBox');
        if (chatBox && document.getElementById('chatArea') &&
            document.getElementById('chatArea').style.display !== 'none') {
          chatBox.scrollTop = chatBox.scrollHeight;
        }
      }

      setAppHeight();
      window.addEventListener('load', setAppHeight);

      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', setAppHeight);
        window.visualViewport.addEventListener('scroll', setAppHeight);
      } else {
        // Fallback for browsers without visualViewport support
        window.addEventListener('resize', setAppHeight);
      }

      // iOS Safari in particular still lets the body itself scroll
      // when an input is focused; this keeps it pinned in place.
      window.addEventListener('orientationchange', () => setTimeout(setAppHeight, 100));
      document.addEventListener('focusin', (e) => {
        if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) {
          setTimeout(setAppHeight, 50);
          setTimeout(setAppHeight, 300);
        }
      });
      document.addEventListener('focusout', () => setTimeout(setAppHeight, 100));
    })();
  </script>
